[unstable]
build-std = ["core"]

[build]
target = "bpfel-unknown-none"

# Tell bpf-linker to emit BTF. Required for any BPF map type whose
# create-time check insists on btf_value_type_id (inode/sk/task storage).
[target.bpfel-unknown-none]
# `--btf` emits both .BTF (required for inode_storage map create) and
# .BTF.ext (func_info / line_info). `--ignore-inline-never` force-inlines
# anything LLVM would otherwise emit as a subprog, which would generate
# func_info entries that don't match BTF FUNC declarations.
rustflags = [
    "-C", "link-arg=--btf",
    "-C", "link-arg=--ignore-inline-never",
]
