name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # `cargo clippy` / `cargo test` on linprov triggers its build.rs, which
  # cross-builds linprov-ebpf for the bpfel target via bpf-linker. So
  # bpf-linker has to be installed even for the lint job.
  lint-and-test:
    name: fmt / clippy / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain (from rust-toolchain.toml)
        run: |
          rustup show active-toolchain || rustup toolchain install
          rustup component add rustfmt clippy rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install bpf-linker
        run: cargo install --locked bpf-linker

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy (host)
        run: cargo clippy --workspace --all-targets -- -D warnings

      # The workspace clippy only checks linprov-ebpf's lib stub for the
      # host; `src/main.rs` is gated by `required-features = ["bpf-build"]`.
      # Run it explicitly against the bpfel target so warnings in the BPF
      # program fail CI too.
      - name: cargo clippy (linprov-ebpf, bpfel target)
        run: >
          cargo clippy -p linprov-ebpf
          --target bpfel-unknown-none
          -Zbuild-std=core
          --features bpf-build
          --bin linprov-ebpf
          -- -D warnings

      - name: cargo test
        run: cargo test --workspace

  # Belt-and-suspenders build job. Same toolchain, separate cache. If
  # lint-and-test passes but the full build trips something
  # release-profile-only, this catches it.
  build-daemon:
    name: build daemon (incl. BPF)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          rustup show active-toolchain || rustup toolchain install
          rustup component add rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: build-daemon

      - name: Install bpf-linker
        run: cargo install --locked bpf-linker

      - name: cargo build (workspace)
        run: cargo build --workspace
