name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # Fast path: lint, format, and run the unit tests against the userspace
  # crates. The BPF crate is excluded because its `r1..r5` inline-asm
  # registers only resolve under the bpfel target.
  lint-and-test:
    name: fmt / clippy / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain (from rust-toolchain.toml)
        run: |
          rustup show active-toolchain || rustup toolchain install
          rustup component add rustfmt clippy rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy (userspace crates only)
        run: cargo clippy --workspace --exclude linprov-ebpf --all-targets -- -D warnings

      - name: cargo test (userspace crates only)
        run: cargo test --workspace --exclude linprov-ebpf

  # Build the full daemon (userspace + nested BPF object) to catch
  # regressions on the bpfel target. Slower because bpf-linker has to be
  # installed from source; gated to push/main + PR so it runs less often.
  build-daemon:
    name: build daemon (incl. BPF)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          rustup show active-toolchain || rustup toolchain install
          rustup component add rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          # Separate cache key so the userspace job's cache doesn't get
          # invalidated by bpf-linker compilation.
          key: build-daemon

      - name: Install bpf-linker
        run: cargo install --locked bpf-linker

      - name: cargo build (workspace)
        run: cargo build --workspace
