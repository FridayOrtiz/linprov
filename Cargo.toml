[workspace]
resolver = "2"
members = [
    "linprov",
    "linprov-common",
    "linprov-ebpf",
]
default-members = ["linprov"]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
repository = "https://github.com/FridayOrtiz/linprov"

[workspace.dependencies]
aya = { version = "0.13" }
aya-build = { version = "0.1" }
aya-ebpf = { version = "0.1" }
aya-log = { version = "0.2" }
aya-log-ebpf = { version = "0.1" }

anyhow = "1"
bytemuck = { version = "1", features = ["derive"] }
cargo_metadata = "0.18"
clap = { version = "4", features = ["derive"] }
env_logger = "0.11"
libc = "0.2"
log = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = [
    "rt-multi-thread",
    "macros",
    "signal",
    "time",
    "io-util",
    "fs",
    "net",
] }
xattr = "1"

linprov-common = { path = "linprov-common" }

# eBPF programs need aggressive optimization; the verifier rejects un-inlined
# code paths and the in-kernel stack is only 512 bytes.
[profile.dev]
opt-level = 3
debug = false
debug-assertions = false
overflow-checks = false
lto = false
panic = "abort"
incremental = false
codegen-units = 256
rpath = false

[profile.release]
opt-level = 3
debug = false
debug-assertions = false
overflow-checks = false
lto = true
panic = "abort"
incremental = false
codegen-units = 1
rpath = false
